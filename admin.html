<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Bless Vegs Admin</title>

<style>
body{font-family:Arial;margin:0;background:#f7f7f7;}
.wrap{max-width:1100px;margin:auto;padding:16px;}
.logo{width:70px;}
.card{background:#fff;padding:16px;border-radius:12px;margin-bottom:16px;}
input,textarea,select{width:100%;padding:10px;margin-top:6px;margin-bottom:10px;}
button{padding:10px;margin-top:10px;cursor:pointer;}
.hidden{display:none;}
.list{margin-top:10px;}
.item{border-bottom:1px solid #ddd;padding:10px 0;}
</style>
</head>

<body>

<div class="wrap">

<img src="blessvegs-logo.png" class="logo"/>

<h1>Bless Vegs Admin</h1>

<!-- LOGIN -->
<div id="loginView" class="card">
<h2>Login</h2>
<input id="username" placeholder="Gebruikersnaam"/>
<input id="password" type="password" placeholder="Wachtwoord"/>
<button onclick="login()">Inloggen</button>
<div id="loginMsg"></div>
</div>

<!-- ADMIN -->
<div id="adminView" class="hidden">

<div class="card">

<h2>Nieuw product</h2>

<input id="name" placeholder="Naam"/>
<input id="price" type="number" placeholder="Prijs"/>
<input id="discount" type="number" placeholder="Kortingsprijs"/>
<input id="stock" type="number" placeholder="Voorraad"/>

<select id="stockType">
<option value="stuk">stuk</option>
<option value="bos">bos</option>
<option value="bakje">bakje</option>
</select>

<textarea id="desc" placeholder="Beschrijving"></textarea>
<input id="photo" placeholder="foto naam (bijv amsoi.jpg)"/>

<button onclick="save()">Opslaan</button>
<button onclick="resetForm()">Reset</button>
<button onclick="logout()">Logout</button>

<div id="formMsg"></div>

</div>

<div class="card">

<h2>Producten</h2>

<input id="search" placeholder="Zoek..." oninput="render()"/>

<button onclick="load()">Refresh</button>

<!-- 🔥 FIXED LIVE LINK -->
<a href="https://bvegs.github.io/" target="_blank">
<button>Bekijk live site</button>
</a>

<div id="list" class="list"></div>

</div>

</div>

</div>

<script>
const API = "https://blessvegs-backend.onrender.com";
let token = localStorage.getItem("token") || "";
let products = [];
let editing = null;

function showAdmin(){
document.getElementById("loginView").classList.add("hidden");
document.getElementById("adminView").classList.remove("hidden");
}

function showLogin(){
document.getElementById("loginView").classList.remove("hidden");
document.getElementById("adminView").classList.add("hidden");
}

async function login(){
try{
let res = await fetch(API+"/admin/login",{
method:"POST",
headers:{'Content-Type':'application/json'},
body:JSON.stringify({
username:document.getElementById("username").value,
password:document.getElementById("password").value
})
});
let data = await res.json();

if(data.ok){
token = data.token;
localStorage.setItem("token",token);
showAdmin();
load();
}else{
document.getElementById("loginMsg").innerText=data.error;
}

}catch(e){
document.getElementById("loginMsg").innerText="Login error";
}
}

function logout(){
localStorage.removeItem("token");
token="";
showLogin();
}

async function load(){
let res = await fetch(API+"/admin/products",{
headers:{Authorization:"Bearer "+token}
});
let data = await res.json();
products = data.data || [];
render();
}

function render(){
let q = document.getElementById("search").value.toLowerCase();
let list = document.getElementById("list");
list.innerHTML="";

products.filter(p => (p.name||"").toLowerCase().includes(q))
.forEach(p=>{
let price = (p.kortingsprijs>0 && p.kortingsprijs<p.prijs)?p.kortingsprijs:p.prijs;

let div=document.createElement("div");
div.className="item";

div.innerHTML=`
<b>${p.name}</b><br>
€${price}<br>
Voorraad: ${p.voorraad}<br>

<button onclick="edit(${p.id})">Edit</button>
<button onclick="del(${p.id})">Delete</button>
`;

list.appendChild(div);
});
}

function edit(id){
let p=products.find(x=>x.id==id);
editing=id;
name.value=p.name;
price.value=p.prijs;
discount.value=p.kortingsprijs;
stock.value=p.voorraad;
stockType.value=p.voorraad_type;
desc.value=p.beschrijving;
photo.value=p.foto;
}

function resetForm(){
editing=null;
name.value="";
price.value="";
discount.value="";
stock.value="";
desc.value="";
photo.value="";
}

async function save(){
let body={
name:name.value,
prijs:+price.value,
basis_prijs:+price.value,
kortingsprijs:+discount.value||0,
voorraad:+stock.value,
voorraad_aantal:+stock.value,
voorraad_type:stockType.value,
voorraad_eenheid:stockType.value,
verkoop_type:"stuk",
basis_eenheid:stockType.value,
minimum_bestelhoeveelheid:1,
stapgrootte:1,
beschrijving:desc.value,
foto:photo.value
};

let url = editing ? "/admin/products/"+editing : "/admin/products";
let method = editing ? "PUT" : "POST";

await fetch(API+url,{
method,
headers:{
'Content-Type':'application/json',
Authorization:"Bearer "+token
},
body:JSON.stringify(body)
});

load();
resetForm();
}

async function del(id){
if(!confirm("Verwijderen?"))return;

await fetch(API+"/admin/products/"+id,{
method:"DELETE",
headers:{Authorization:"Bearer "+token}
});

load();
}

if(token){
showAdmin();
load();
}
</script>

</body>
</html>
