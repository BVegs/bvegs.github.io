<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Bless Vegs Admin</title>

<style>
:root{
--green:#14532d;
--green-dark:#0f3f22;
--green-light:#1f7a44;
--bg:#f4f7f4;
--card:#ffffff;
--text:#1b1b1b;
--muted:#666;
--danger:#b91c1c;
--radius:18px;
}

*{
box-sizing:border-box;
}

body{
margin:0;
font-family:Arial,Helvetica,sans-serif;
background:linear-gradient(180deg,#eef7ef 0%,#f7f7f7 100%);
color:var(--text);
}

.wrap{
max-width:1250px;
padding:20px;
margin:auto;
}

.header{
display:flex;
align-items:center;
justify-content:space-between;
gap:20px;
margin-bottom:20px;
background:linear-gradient(135deg,var(--green),var(--green-dark));
padding:20px;
border-radius:24px;
color:#fff;
box-shadow:0 10px 30px rgba(0,0,0,.15);
}

.brand{
display:flex;
align-items:center;
gap:16px;
}

.logo{
width:95px;
height:95px;
object-fit:contain;
background:#fff;
padding:8px;
border-radius:20px;
}

.brand h1{
margin:0;
font-size:34px;
}

.brand p{
margin:6px 0 0;
opacity:.9;
}

.card{
background:var(--card);
border-radius:var(--radius);
padding:20px;
margin-bottom:20px;
box-shadow:0 10px 30px rgba(0,0,0,.06);
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
gap:14px;
}

input,textarea,select{
width:100%;
padding:14px;
border-radius:14px;
border:1px solid #dcdcdc;
font-size:15px;
margin-top:8px;
background:#fff;
}

textarea{
min-height:120px;
resize:vertical;
}

button{
border:none;
border-radius:14px;
padding:13px 18px;
font-size:15px;
font-weight:bold;
cursor:pointer;
transition:.2s;
}

.primary{
background:var(--green);
color:#fff;
}

.primary:hover{
background:var(--green-dark);
}

.secondary{
background:#ececec;
}

.danger{
background:var(--danger);
color:#fff;
}

.actions{
display:flex;
flex-wrap:wrap;
gap:10px;
margin-top:10px;
}

.hidden{
display:none;
}

#loginView{
max-width:520px;
margin:50px auto;
}

.login-title{
text-align:center;
margin-bottom:20px;
}

.login-logo{
width:120px;
display:block;
margin:auto;
margin-bottom:12px;
}

#loginMsg,
#formMsg{
margin-top:14px;
font-weight:bold;
}

.products{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(280px,1fr));
gap:18px;
margin-top:20px;
}

.product{
background:#fff;
border-radius:22px;
overflow:hidden;
box-shadow:0 10px 24px rgba(0,0,0,.08);
border:1px solid #ececec;
}

.product-image{
width:100%;
height:220px;
object-fit:cover;
background:#e7efe8;
}

.product-body{
padding:16px;
}

.badges{
display:flex;
flex-wrap:wrap;
gap:8px;
margin-bottom:10px;
}

.badge{
padding:6px 10px;
border-radius:999px;
font-size:12px;
font-weight:bold;
background:#e8f5eb;
color:var(--green-dark);
}

.price-old{
text-decoration:line-through;
color:#999;
font-size:14px;
}

.price-new{
font-size:24px;
font-weight:bold;
color:var(--green-dark);
margin-top:4px;
}

.topbar{
display:flex;
flex-wrap:wrap;
justify-content:space-between;
gap:14px;
align-items:center;
}

.search{
flex:1;
min-width:240px;
}

@media(max-width:768px){
.header{
flex-direction:column;
align-items:flex-start;
}

.brand h1{
font-size:28px;
}

.logo{
width:75px;
height:75px;
}
}
</style>
</head>
<body>

<div class="wrap">

<div id="loginView">
<div class="card">

<div class="login-title">
<img src="blessvegs-logo.png" class="login-logo">
<h1>Bless Vegs Admin</h1>
<p>Beveiligde admin toegang met 2FA</p>
</div>

<input id="username" placeholder="Gebruikersnaam">
<input id="password" type="password" placeholder="Wachtwoord">
<input id="twofactor" placeholder="Authenticator 2FA code">

<button class="primary" onclick="login()">Inloggen</button>

<div id="loginMsg"></div>

</div>
</div>

<div id="adminView" class="hidden">

<div class="header">
<div class="brand">
<img src="blessvegs-logo.png" class="logo">
<div>
<h1>Bless Vegs</h1>
<p>Biologisch • Niet bespoten • Met liefde geteeld.</p>
</div>
</div>

<div class="actions">
<a href="https://bvegs.github.io/" target="_blank">
<button class="secondary">Live site bekijken</button>
</a>
<button class="danger" onclick="logout()">Logout</button>
</div>
</div>

<div class="card">
<h2>Product beheren</h2>

<div class="grid">
<div>
<label>Naam</label>
<input id="name" placeholder="Bijv. Groene Amsoi">
</div>

<div>
<label>Basisprijs (€)</label>
<input id="price" type="number" step="0.01">
</div>

<div>
<label>Kortingsprijs (€)</label>
<input id="discount" type="number" step="0.01">
</div>

<div>
<label>Voorraad</label>
<input id="stock" type="number">
</div>

<div>
<label>Verkoop type</label>
<select id="sellType">
<option value="stuk">stuk</option>
<option value="bos">bos</option>
<option value="bakje">bakje</option>
<option value="gewicht">gewicht</option>
</select>
</div>

<div>
<label>Eenheid</label>
<select id="stockType">
<option value="stuk">stuk</option>
<option value="bos">bos</option>
<option value="bakje">bakje</option>
<option value="kg">kg</option>
<option value="g">g</option>
</select>
</div>

<div>
<label>Minimum hoeveelheid</label>
<input id="minQty" type="number" value="1">
</div>

<div>
<label>Stapgrootte</label>
<input id="stepQty" type="number" value="1">
</div>
</div>

<label>Beschrijving</label>
<textarea id="desc"></textarea>

<label>Foto URL of bestandsnaam</label>
<input id="photo" placeholder="Bijv. Groene-Amsoi.jpg">

<div class="actions">
<button class="primary" onclick="save()">Opslaan</button>
<button class="secondary" onclick="resetForm()">Reset</button>
</div>

<div id="formMsg"></div>

</div>

<div class="card">
<div class="topbar">
<h2>Producten</h2>
<input id="search" class="search" placeholder="Zoek product..." oninput="render()">
</div>

<div id="list" class="products"></div>
</div>

</div>

</div>

<script>
const API = "https://blessvegs-backend.onrender.com";

let token = localStorage.getItem("token") || "";
let products = [];
let editing = null;

function showAdmin(){
document.getElementById("loginView").classList.add("hidden");
document.getElementById("adminView").classList.remove("hidden");
}

function showLogin(){
document.getElementById("loginView").classList.remove("hidden");
document.getElementById("adminView").classList.add("hidden");
}

async function login(){
try{

const res = await fetch(API+"/admin/login",{
method:"POST",
headers:{
'Content-Type':'application/json'
},
body:JSON.stringify({
username:username.value,
password:password.value,
token:twofactor.value
})
});

const data = await res.json();

if(data.ok){

const jwtToken = data.data.token;

localStorage.setItem("token",jwtToken);

token = jwtToken;

showAdmin();

load();

}else{
loginMsg.innerText = data.error || "Login mislukt";
}

}catch(e){
loginMsg.innerText = "Login error";
}
}

function logout(){
localStorage.removeItem("token");
token="";
showLogin();
}

async function load(){

const res = await fetch(API+"/admin/products",{
headers:{
Authorization:"Bearer "+token
}
});

const data = await res.json();

products = data.data || [];

render();
}

function render(){

const q = search.value.toLowerCase();

list.innerHTML="";

products
.filter(p => (p.name || "").toLowerCase().includes(q))
.forEach(p=>{

const price = (p.kortingsprijs > 0 && p.kortingsprijs < p.prijs)
? p.kortingsprijs
: p.prijs;

const image = p.foto
? (p.foto.startsWith("http") ? p.foto : "images/"+p.foto)
: "";

const card = document.createElement("div");
card.className = "product";

card.innerHTML = `
${image ? `<img src="${image}" class="product-image">` : `<div class="product-image"></div>`}

<div class="product-body">
<div class="badges">
<div class="badge">${p.verkoop_type || 'stuk'}</div>
<div class="badge">${p.voorraad || 0} ${p.voorraad_type || ''}</div>
</div>

<h3>${p.name || ''}</h3>

${p.kortingsprijs > 0 ? `<div class="price-old">€${p.prijs}</div>` : ``}

<div class="price-new">€${price}</div>

<p>${p.beschrijving || ''}</p>

<div class="actions">
<button class="secondary" onclick="edit(${p.id})">Edit</button>
<button class="danger" onclick="del(${p.id})">Delete</button>
</div>
</div>
`;

list.appendChild(card);

});
}

function edit(id){

const p = products.find(x => x.id == id);

editing = id;

name.value = p.name || "";
price.value = p.prijs || 0;
discount.value = p.kortingsprijs || 0;
stock.value = p.voorraad || 0;
stockType.value = p.voorraad_type || "stuk";
sellType.value = p.verkoop_type || "stuk";
desc.value = p.beschrijving || "";
photo.value = p.foto || "";
minQty.value = p.minimum_bestelhoeveelheid || 1;
stepQty.value = p.stapgrootte || 1;
}

function resetForm(){
editing = null;
name.value="";
price.value="";
discount.value="";
stock.value="";
desc.value="";
photo.value="";
minQty.value=1;
stepQty.value=1;
}

async function save(){

const verkoopType = sellType.value;
const eenheid = stockType.value;

const body = {
name:name.value,
prijs:+price.value,
basis_prijs:+price.value,
kortingsprijs:+discount.value || 0,
voorraad:+stock.value,
voorraad_aantal:+stock.value,
voorraad_type:eenheid,
voorraad_eenheid:eenheid,
verkoop_type:verkoopType,
basis_eenheid:eenheid,
minimum_bestelhoeveelheid:+minQty.value,
stapgrootte:+stepQty.value,
beschrijving:desc.value,
foto:photo.value
};

const url = editing
? "/admin/products/"+editing
: "/admin/products";

const method = editing
? "PUT"
: "POST";

const res = await fetch(API+url,{
method,
headers:{
'Content-Type':'application/json',
Authorization:'Bearer '+token
},
body:JSON.stringify(body)
});

const data = await res.json();

if(data.ok){
formMsg.innerText = "Product opgeslagen";
load();
resetForm();
}else{
formMsg.innerText = data.error || "Opslaan mislukt";
}
}

async function del(id){

if(!confirm("Product verwijderen?")) return;

await fetch(API+"/admin/products/"+id,{
method:'DELETE',
headers:{
Authorization:'Bearer '+token
}
});

load();
}

if(token){
showAdmin();
load();
}
</script>

</body>
</html>
