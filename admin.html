<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Bless Vegs Admin</title>

<style>
body{font-family:Arial;margin:0;background:#f7f7f7;color:#111}
.wrap{max-width:1100px;margin:auto;padding:16px}
.logo{width:70px;height:70px;object-fit:contain;background:#fff;border-radius:12px;padding:4px}
.card{background:#fff;padding:16px;border-radius:12px;margin-bottom:16px;box-shadow:0 2px 8px rgba(0,0,0,.06)}
input,textarea,select{width:100%;padding:12px;margin-top:6px;margin-bottom:10px;border:1px solid #ddd;border-radius:10px;font:inherit}
button,.linkbtn{padding:11px 14px;margin-top:10px;cursor:pointer;border-radius:10px;border:none;font:inherit;font-weight:700;text-decoration:none;display:inline-flex;align-items:center;justify-content:center}
.btn-primary{background:#14532d;color:#fff}
.btn-secondary{background:#fff;color:#14532d;border:1px solid #ddd}
.btn-danger{background:#fff;color:#b91c1c;border:1px solid #fecaca}
.hidden{display:none}
.list{margin-top:10px}
.item{border:1px solid #e5e7eb;border-radius:12px;padding:12px;margin-bottom:10px;background:#fff}
.row{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.topbar{display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap;margin-bottom:16px}
.actions{display:flex;gap:10px;flex-wrap:wrap}
.msg{margin-top:12px;padding:12px;border-radius:10px;display:none;white-space:pre-wrap;line-height:1.45}
.msg.show{display:block}
.msg.ok{background:#ecfdf5;color:#166534;border:1px solid #bbf7d0}
.msg.err{background:#fef2f2;color:#991b1b;border:1px solid #fecaca}
.muted{color:#6b7280;font-size:.95rem}
@media (max-width:700px){.row{grid-template-columns:1fr}}
</style>
</head>

<body>

<div class="wrap">

  <div class="topbar">
    <div style="display:flex;align-items:center;gap:12px;">
      <img src="blessvegs-logo.png" class="logo" alt="Bless Vegs logo" onerror="this.style.display='none';" />
      <div>
        <h1 style="margin:0;color:#14532d;">Bless Vegs Admin</h1>
        <div class="muted">Veilige productbeheer omgeving</div>
      </div>
    </div>
    <div class="actions">
      <a class="linkbtn btn-secondary" href="https://bvegs.github.io/" target="_blank" rel="noopener">Bekijk live site</a>
    </div>
  </div>

  <!-- LOGIN -->
  <div id="loginView" class="card">
    <h2>Login</h2>

    <label for="username">Gebruikersnaam</label>
    <input id="username" placeholder="Gebruikersnaam" />

    <label for="password">Wachtwoord</label>
    <input id="password" type="password" placeholder="Wachtwoord" />

    <div class="actions">
      <button class="btn-primary" id="loginBtn" type="button">Inloggen</button>
    </div>

    <div id="loginMsg" class="msg"></div>
  </div>

  <!-- ADMIN -->
  <div id="adminView" class="hidden">

    <div class="card">
      <h2 id="formTitle">Nieuw product</h2>

      <label for="name">Naam</label>
      <input id="name" placeholder="Naam" />

      <div class="row">
        <div>
          <label for="price">Prijs</label>
          <input id="price" type="number" step="0.01" placeholder="Prijs" />
        </div>
        <div>
          <label for="discount">Kortingsprijs</label>
          <input id="discount" type="number" step="0.01" placeholder="Kortingsprijs" />
        </div>
      </div>

      <div class="row">
        <div>
          <label for="stock">Voorraad</label>
          <input id="stock" type="number" step="1" placeholder="Voorraad" />
        </div>
        <div>
          <label for="stockType">Voorraad type</label>
          <select id="stockType">
            <option value="stuk">stuk</option>
            <option value="bos">bos</option>
            <option value="bakje">bakje</option>
          </select>
        </div>
      </div>

      <label for="desc">Beschrijving</label>
      <textarea id="desc" placeholder="Beschrijving"></textarea>

      <label for="photo">Foto naam</label>
      <input id="photo" placeholder="bijv amsoi.jpg" />

      <div class="actions">
        <button class="btn-primary" id="saveBtn" type="button">Opslaan</button>
        <button class="btn-secondary" id="resetBtn" type="button">Reset</button>
        <button class="btn-danger" id="logoutBtn" type="button">Logout</button>
      </div>

      <div id="formMsg" class="msg"></div>
    </div>

    <div class="card">
      <h2>Producten</h2>

      <div class="actions">
        <input id="search" placeholder="Zoek..." style="flex:1;min-width:220px;margin:0" />
        <button class="btn-secondary" id="refreshBtn" type="button">Refresh</button>
      </div>

      <div id="listMsg" class="msg"></div>
      <div id="list" class="list"></div>
    </div>

  </div>

</div>

<script>
const API = "https://blessvegs-backend.onrender.com";
const TOKEN_KEY = "blessvegs_admin_token";

let token = localStorage.getItem(TOKEN_KEY) || "";
let products = [];
let editing = null;

const els = {
  loginView: document.getElementById("loginView"),
  adminView: document.getElementById("adminView"),
  username: document.getElementById("username"),
  password: document.getElementById("password"),
  loginBtn: document.getElementById("loginBtn"),
  loginMsg: document.getElementById("loginMsg"),
  formTitle: document.getElementById("formTitle"),
  name: document.getElementById("name"),
  price: document.getElementById("price"),
  discount: document.getElementById("discount"),
  stock: document.getElementById("stock"),
  stockType: document.getElementById("stockType"),
  desc: document.getElementById("desc"),
  photo: document.getElementById("photo"),
  saveBtn: document.getElementById("saveBtn"),
  resetBtn: document.getElementById("resetBtn"),
  logoutBtn: document.getElementById("logoutBtn"),
  formMsg: document.getElementById("formMsg"),
  listMsg: document.getElementById("listMsg"),
  search: document.getElementById("search"),
  refreshBtn: document.getElementById("refreshBtn"),
  list: document.getElementById("list")
};

function showAdmin(){
  els.loginView.classList.add("hidden");
  els.adminView.classList.remove("hidden");
}

function showLogin(){
  els.loginView.classList.remove("hidden");
  els.adminView.classList.add("hidden");
}

function setMsg(el, text, type){
  el.className = "msg show " + type;
  el.textContent = text;
}

function clearMsg(el){
  el.className = "msg";
  el.textContent = "";
}

async function parseJsonSafe(res){
  const text = await res.text();
  try {
    return text ? JSON.parse(text) : {};
  } catch {
    return { raw: text };
  }
}

function resetForm(){
  editing = null;
  els.formTitle.textContent = "Nieuw product";
  els.name.value = "";
  els.price.value = "";
  els.discount.value = "";
  els.stock.value = "";
  els.stockType.value = "stuk";
  els.desc.value = "";
  els.photo.value = "";
  clearMsg(els.formMsg);
}

function effectivePrice(p){
  const normal = Number(p.prijs ?? p.basis_prijs ?? 0);
  const sale = Number(p.kortingsprijs ?? 0);
  return sale > 0 && sale < normal ? sale : normal;
}

function formatEUR(n){
  return new Intl.NumberFormat('nl-NL',{style:'currency',currency:'EUR'}).format(Number(n||0));
}

async function request(path, options = {}){
  const headers = { ...(options.headers || {}) };

  if (options.body && !headers["Content-Type"]) {
    headers["Content-Type"] = "application/json";
  }

  if (token) {
    headers["Authorization"] = "Bearer " + token;
  }

  let res;
  try {
    res = await fetch(API + path, {
      ...options,
      mode: "cors",
      headers
    });
  } catch (err) {
    throw new Error("Netwerkfout. Controleer of Render live is en probeer opnieuw.");
  }

  const data = await parseJsonSafe(res);

  if (!res.ok || data.ok === false) {
    throw new Error(data.error || data.raw || `Request mislukt (${res.status})`);
  }

  return data;
}

async function login(){
  clearMsg(els.loginMsg);

  const username = els.username.value.trim();
  const password = els.password.value;

  if (!username || !password) {
    setMsg(els.loginMsg, "Vul gebruikersnaam en wachtwoord in.", "err");
    return;
  }

  els.loginBtn.disabled = true;
  els.loginBtn.textContent = "Bezig...";

  try {
    const data = await request("/admin/login", {
      method: "POST",
      body: JSON.stringify({ username, password })
    });

    token = data.token || "";
    localStorage.setItem(TOKEN_KEY, token);
    showAdmin();
    setMsg(els.listMsg, "Inloggen gelukt.", "ok");
    await load();
  } catch (e) {
    setMsg(els.loginMsg, e.message, "err");
  } finally {
    els.loginBtn.disabled = false;
    els.loginBtn.textContent = "Inloggen";
  }
}

function logout(){
  localStorage.removeItem(TOKEN_KEY);
  token = "";
  showLogin();
  setMsg(els.loginMsg, "Je bent uitgelogd.", "ok");
}

async function load(){
  clearMsg(els.listMsg);

  try {
    const data = await request("/admin/products", { method: "GET" });
    products = Array.isArray(data.data) ? data.data : [];
    render();
  } catch (e) {
    products = [];
    render();
    setMsg(els.listMsg, e.message, "err");
  }
}

function render(){
  const q = (els.search.value || "").toLowerCase().trim();
  els.list.innerHTML = "";

  const visible = products.filter(p => {
    return (p.name || "").toLowerCase().includes(q);
  });

  if (!visible.length) {
    els.list.innerHTML = `<div class="muted">Geen producten gevonden.</div>`;
    return;
  }

  visible.forEach(p => {
    const price = effectivePrice(p);
    const div = document.createElement("div");
    div.className = "item";

    div.innerHTML = `
      <div style="display:flex;justify-content:space-between;gap:12px;flex-wrap:wrap;">
        <div>
          <div style="font-weight:700;font-size:18px;">${p.name || ""}</div>
          <div class="muted">Voorraad: ${p.voorraad ?? p.voorraad_aantal ?? 0} ${p.voorraad_type || p.voorraad_eenheid || ""}</div>
          <div style="margin-top:6px;color:#14532d;font-weight:700;">${formatEUR(price)}</div>
        </div>
        <div class="actions" style="margin-top:0;">
          <button class="btn-secondary" type="button" data-action="edit" data-id="${p.id}">Edit</button>
          <button class="btn-danger" type="button" data-action="delete" data-id="${p.id}">Delete</button>
        </div>
      </div>
    `;

    els.list.appendChild(div);
  });
}

function editProduct(id){
  const p = products.find(x => Number(x.id) === Number(id));
  if (!p) return;

  editing = Number(id);
  els.formTitle.textContent = "Product bewerken";
  els.name.value = p.name || "";
  els.price.value = p.prijs ?? p.basis_prijs ?? "";
  els.discount.value = Number(p.kortingsprijs || 0) > 0 ? p.kortingsprijs : "";
  els.stock.value = p.voorraad ?? p.voorraad_aantal ?? "";
  els.stockType.value = p.voorraad_type || p.voorraad_eenheid || "stuk";
  els.desc.value = p.beschrijving || "";
  els.photo.value = p.foto || "";
  window.scrollTo({ top: 0, behavior: "smooth" });
}

async function save(){
  clearMsg(els.formMsg);

  const body = {
    name: els.name.value.trim(),
    prijs: Number(els.price.value || 0),
    basis_prijs: Number(els.price.value || 0),
    kortingsprijs: els.discount.value === "" ? 0 : Number(els.discount.value),
    voorraad: Number(els.stock.value || 0),
    voorraad_aantal: Number(els.stock.value || 0),
    voorraad_type: els.stockType.value,
    voorraad_eenheid: els.stockType.value,
    verkoop_type: "stuk",
    basis_eenheid: els.stockType.value,
    minimum_bestelhoeveelheid: 1,
    stapgrootte: 1,
    beschrijving: els.desc.value.trim(),
    foto: els.photo.value.trim()
  };

  if (!body.name) {
    setMsg(els.formMsg, "Productnaam is verplicht.", "err");
    return;
  }

  if (body.prijs < 0 || body.voorraad < 0) {
    setMsg(els.formMsg, "Prijs en voorraad moeten 0 of hoger zijn.", "err");
    return;
  }

  if (body.kortingsprijs > 0 && body.kortingsprijs >= body.prijs) {
    setMsg(els.formMsg, "Kortingsprijs moet lager zijn dan prijs.", "err");
    return;
  }

  const url = editing ? "/admin/products/" + editing : "/admin/products";
  const method = editing ? "PUT" : "POST";

  try {
    await request(url, {
      method,
      body: JSON.stringify(body)
    });

    setMsg(els.formMsg, editing ? "Product bijgewerkt." : "Product opgeslagen.", "ok");
    await load();
    resetForm();
  } catch (e) {
    setMsg(els.formMsg, e.message, "err");
  }
}

async function delProduct(id){
  if (!confirm("Verwijderen?")) return;

  try {
    await request("/admin/products/" + id, {
      method: "DELETE"
    });
    setMsg(els.listMsg, "Product verwijderd.", "ok");
    if (editing === Number(id)) resetForm();
    await load();
  } catch (e) {
    setMsg(els.listMsg, e.message, "err");
  }
}

els.password.addEventListener("keydown", (e) => {
  if (e.key === "Enter") login();
});

els.loginBtn.addEventListener("click", login);
els.logoutBtn.addEventListener("click", logout);
els.saveBtn.addEventListener("click", save);
els.resetBtn.addEventListener("click", resetForm);
els.refreshBtn.addEventListener("click", load);
els.search.addEventListener("input", render);

els.list.addEventListener("click", (e) => {
  const btn = e.target.closest("button[data-action]");
  if (!btn) return;

  const id = btn.dataset.id;
  const action = btn.dataset.action;

  if (action === "edit") editProduct(id);
  if (action === "delete") delProduct(id);
});

if (token) {
  showAdmin();
  load();
}
</script>

</body>
</html>
