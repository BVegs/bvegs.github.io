<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Bless Vegs Admin</title>

<style>
:root{
  --green:#14532d;
  --green-dark:#0f3f22;
  --green-deep:#0b2f19;
  --green-soft:#edf7ef;
  --bg:#f4f7f3;
  --card:#ffffff;
  --text:#111827;
  --muted:#5f6b66;
  --border:#e4e7e3;
  --danger:#b42318;
  --ok:#027a48;
}

*{box-sizing:border-box}

body{
  margin:0;
  font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
  background:linear-gradient(135deg,#f4f7f3,#e9f5ec);
  color:var(--text);
}

.hidden{display:none!important}

.admin-wrap{
  width:min(1180px,94%);
  margin:0 auto;
  padding:28px 0 60px;
}

.header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  gap:16px;
  margin-bottom:22px;
}

.brand{
  display:flex;
  align-items:center;
  gap:12px;
}

.logo{
  width:54px;
  height:54px;
  border-radius:16px;
  background:var(--green);
  display:grid;
  place-items:center;
  color:white;
  font-weight:900;
  box-shadow:0 10px 25px rgba(20,83,45,.25);
}

.brand h1{
  margin:0;
  color:var(--green-deep);
  font-size:1.7rem;
}

.brand p{
  margin:2px 0 0;
  color:var(--muted);
  font-size:.95rem;
}

.card{
  background:var(--card);
  border:1px solid var(--border);
  border-radius:24px;
  box-shadow:0 18px 50px rgba(15,63,34,.10);
  padding:22px;
}

.login-card{
  width:min(440px,94%);
  margin:8vh auto;
}

h2,h3{
  margin-top:0;
  color:var(--green-deep);
}

label{
  display:block;
  font-weight:700;
  margin:14px 0 6px;
}

input,textarea,select{
  width:100%;
  border:1px solid var(--border);
  border-radius:14px;
  padding:12px 13px;
  font:inherit;
  background:#fff;
}

textarea{
  min-height:88px;
  resize:vertical;
}

button{
  border:0;
  border-radius:14px;
  padding:12px 16px;
  font-weight:800;
  cursor:pointer;
  font:inherit;
}

.btn{
  background:var(--green);
  color:white;
}

.btn:hover{background:var(--green-dark)}

.btn-soft{
  background:var(--green-soft);
  color:var(--green-deep);
}

.btn-danger{
  background:#fee4e2;
  color:var(--danger);
}

.btn-row{
  display:flex;
  gap:10px;
  flex-wrap:wrap;
  margin-top:16px;
}

.status{
  margin-top:14px;
  padding:12px 14px;
  border-radius:14px;
  background:#f3f4f6;
  color:var(--muted);
  font-weight:650;
}

.status.ok{
  background:#ecfdf3;
  color:var(--ok);
}

.status.err{
  background:#fef3f2;
  color:var(--danger);
}

.grid{
  display:grid;
  grid-template-columns:380px 1fr;
  gap:18px;
}

@media(max-width:900px){
  .grid{grid-template-columns:1fr}
  .header{align-items:flex-start;flex-direction:column}
}

.product-list{
  display:grid;
  gap:12px;
}

.product-item{
  border:1px solid var(--border);
  border-radius:18px;
  padding:14px;
  display:grid;
  grid-template-columns:74px 1fr;
  gap:12px;
  background:#fff;
}

.product-img{
  width:74px;
  height:74px;
  object-fit:cover;
  border-radius:16px;
  background:var(--green-soft);
}

.product-title{
  font-weight:900;
  color:var(--green-deep);
}

.product-meta{
  color:var(--muted);
  font-size:.92rem;
  margin-top:4px;
}

.actions{
  display:flex;
  gap:8px;
  margin-top:10px;
  flex-wrap:wrap;
}

.small{
  font-size:.9rem;
  color:var(--muted);
}

.twofa-box{
  border:1px solid #bbf7d0;
  background:#f0fdf4;
  border-radius:18px;
  padding:14px;
  margin-top:14px;
}

.top-actions{
  display:flex;
  gap:10px;
  flex-wrap:wrap;
}
</style>
</head>

<body>

<section id="loginView" class="login-card card">
  <div class="brand">
    <div class="logo">BV</div>
    <div>
      <h1>Bless Vegs</h1>
      <p>Veilige admin login</p>
    </div>
  </div>

  <h2 style="margin-top:22px;">Inloggen</h2>

  <label for="username">Gebruikersnaam</label>
  <input id="username" autocomplete="username" placeholder="Admin gebruikersnaam">

  <label for="password">Wachtwoord</label>
  <input id="password" type="password" autocomplete="current-password" placeholder="Admin wachtwoord">

  <div id="twoFactorBox" class="twofa-box hidden">
    <strong>2FA verificatie</strong>
    <p class="small">Vul de 6-cijferige code in van je authenticator-app.</p>

    <label for="twoFactorCode">2FA code</label>
    <input id="twoFactorCode" inputmode="numeric" maxlength="8" placeholder="Bijv. 123456">
  </div>

  <div class="btn-row">
    <button class="btn" onclick="login()">Inloggen</button>
  </div>

  <div id="loginStatus" class="status hidden"></div>
</section>

<section id="adminView" class="admin-wrap hidden">
  <div class="header">
    <div class="brand">
      <div class="logo">BV</div>
      <div>
        <h1>Bless Vegs Admin</h1>
        <p>Productbeheer met beveiligde backend</p>
      </div>
    </div>

    <div class="top-actions">
      <button class="btn-soft" onclick="loadHealth()">Backend check</button>
      <button class="btn-soft" onclick="loadProducts()">Ververs producten</button>
      <button class="btn-danger" onclick="logout()">Uitloggen</button>
    </div>
  </div>

  <div id="adminStatus" class="status hidden"></div>

  <div class="grid">
    <div class="card">
      <h2 id="formTitle">Nieuw product</h2>

      <input type="hidden" id="productId">

      <label>Naam</label>
      <input id="naam" placeholder="Bijv. Groene Amsoi">

      <label>Beschrijving</label>
      <textarea id="beschrijving" placeholder="Korte beschrijving van het product"></textarea>

      <label>Prijs</label>
      <input id="prijs" type="number" step="0.01" placeholder="Bijv. 8.99">

      <label>Kortingsprijs</label>
      <input id="kortingsprijs" type="number" step="0.01" placeholder="Optioneel">

      <label>Verkoop type</label>
      <select id="verkoop_type">
        <option value="stuk">stuk</option>
        <option value="bos">bos</option>
        <option value="bakje">bakje</option>
        <option value="gewicht">gewicht</option>
      </select>

      <label>Basis eenheid</label>
      <select id="basis_eenheid">
        <option value="stuk">stuk</option>
        <option value="bos">bos</option>
        <option value="bakje">bakje</option>
        <option value="kg">kg</option>
        <option value="g">g</option>
      </select>

      <label>Voorraad aantal</label>
      <input id="voorraad" type="number" step="1" placeholder="Bijv. 10">

      <label>Voorraad eenheid</label>
      <select id="voorraad_type">
        <option value="stuk">stuk</option>
        <option value="bos">bos</option>
        <option value="bakje">bakje</option>
        <option value="kg">kg</option>
        <option value="g">g</option>
      </select>

      <label>Foto bestandsnaam of URL</label>
      <input id="foto" placeholder="Bijv. Groene-Amsoi.jpg">

      <label>Actief op live site</label>
      <select id="actief">
        <option value="true">Ja</option>
        <option value="false">Nee</option>
      </select>

      <div class="btn-row">
        <button class="btn" onclick="saveProduct()">Opslaan</button>
        <button class="btn-soft" onclick="resetForm()">Nieuw/leeg maken</button>
      </div>
    </div>

    <div class="card">
      <h2>Producten</h2>
      <p class="small">Hier beheer je de producten die via je backend/Supabase worden geladen.</p>
      <div id="productList" class="product-list"></div>
    </div>
  </div>
</section>

<script>
const BACKEND_URL = "https://blessvegs-backend.onrender.com";

let token = localStorage.getItem("blessvegs_admin_token") || "";
let twoFactorPending = false;

const $ = id => document.getElementById(id);

function showStatus(id, message, type = "") {
  const el = $(id);
  el.textContent = message;
  el.className = "status " + type;
  el.classList.remove("hidden");
}

function clearStatus(id) {
  $(id).classList.add("hidden");
}

function authHeaders() {
  return {
    "Content-Type": "application/json",
    "Authorization": "Bearer " + token
  };
}

function normalizeResponse(json) {
  return json?.data || json;
}

async function api(path, options = {}) {
  const res = await fetch(BACKEND_URL + path, options);
  const text = await res.text();

  let json = {};
  try { json = text ? JSON.parse(text) : {}; }
  catch { json = { ok:false, error:text || "Ongeldige serverreactie." }; }

  if (!res.ok || json.ok === false) {
    throw new Error(json.error || json.message || "Serverfout.");
  }

  return json;
}

function enterAdmin() {
  $("loginView").classList.add("hidden");
  $("adminView").classList.remove("hidden");
  loadHealth();
  loadProducts();
}

function logout() {
  token = "";
  localStorage.removeItem("blessvegs_admin_token");
  location.reload();
}

async function login() {
  clearStatus("loginStatus");

  const username = $("username").value.trim();
  const password = $("password").value;
  const twoFactorCode = $("twoFactorCode").value.trim();

  if (!username || !password) {
    showStatus("loginStatus", "Vul gebruikersnaam en wachtwoord in.", "err");
    return;
  }

  if (twoFactorPending && !twoFactorCode) {
    showStatus("loginStatus", "Vul je 2FA code in.", "err");
    return;
  }

  try {
    showStatus("loginStatus", "Inloggen controleren...");

    const payload = { username, password };

    if (twoFactorCode) {
      payload.code = twoFactorCode;
      payload.token = twoFactorCode;
      payload.twoFactorCode = twoFactorCode;
      payload.otp = twoFactorCode;
    }

    const json = await api("/admin/login", {
      method: "POST",
      headers: { "Content-Type":"application/json" },
      body: JSON.stringify(payload)
    });

    const data = normalizeResponse(json);

    const requires2FA =
      data?.requires2FA === true ||
      data?.requiresTwoFactor === true ||
      data?.two_factor_required === true ||
      data?.twoFactorRequired === true ||
      json?.requires2FA === true ||
      json?.requiresTwoFactor === true ||
      json?.two_factor_required === true ||
      json?.twoFactorRequired === true;

    if (requires2FA && !data?.token && !json?.token) {
      twoFactorPending = true;
      $("twoFactorBox").classList.remove("hidden");
      showStatus("loginStatus", "Wachtwoord klopt. Vul nu je 2FA code in.", "ok");
      $("twoFactorCode").focus();
      return;
    }

    token = data?.token || json?.token || data?.accessToken || json?.accessToken;

    if (!token) {
      throw new Error("Login gelukt, maar backend stuurde geen admin token terug.");
    }

    localStorage.setItem("blessvegs_admin_token", token);
    showStatus("loginStatus", "Ingelogd.", "ok");
    enterAdmin();

  } catch (err) {
    showStatus("loginStatus", err.message, "err");
  }
}

async function loadHealth() {
  try {
    const json = await api("/health");
    const data = normalizeResponse(json);

    const ai = data.ai_enabled ? "AI aan" : "AI uit";
    const twofa = data.two_factor_enabled ? "2FA aan" : "2FA uit";

    showStatus("adminStatus", `Backend live — ${ai} — ${twofa}`, "ok");
  } catch (err) {
    showStatus("adminStatus", err.message, "err");
  }
}

async function loadProducts() {
  const list = $("productList");
  list.innerHTML = "<div class='status'>Producten laden...</div>";

  try {
    const json = await api("/admin/products", {
      headers: authHeaders()
    });

    const data = normalizeResponse(json);
    const products = Array.isArray(data) ? data : data.products || [];

    if (!products.length) {
      list.innerHTML = "<div class='status'>Nog geen producten gevonden.</div>";
      return;
    }

    list.innerHTML = products.map(p => {
      const img = imageUrl(p.foto || p.afbeelding);
      const price = p.basis_prijs ?? p.prijs ?? "";
      const stock = p.voorraad_aantal ?? p.voorraad ?? "";
      const unit = p.voorraad_eenheid ?? p.voorraad_type ?? "";

      return `
        <div class="product-item">
          <img class="product-img" src="${escapeHtml(img)}" onerror="this.style.display='none'">
          <div>
            <div class="product-title">${escapeHtml(p.naam || p.name || "Zonder naam")}</div>
            <div class="product-meta">Prijs: €${escapeHtml(String(price))} · Voorraad: ${escapeHtml(String(stock))} ${escapeHtml(String(unit))}</div>
            <div class="product-meta">${p.actief === false ? "Niet live" : "Live actief"}</div>
            <div class="actions">
              <button class="btn-soft" onclick='editProduct(${JSON.stringify(p).replace(/'/g,"&apos;")})'>Bewerken</button>
              <button class="btn-danger" onclick="deleteProduct('${p.id}')">Verwijderen</button>
            </div>
          </div>
        </div>
      `;
    }).join("");

  } catch (err) {
    list.innerHTML = `<div class="status err">${escapeHtml(err.message)}</div>`;
  }
}

function imageUrl(value) {
  if (!value) return "";
  if (value.startsWith("http://") || value.startsWith("https://")) return value;
  return "images/" + value.replace(/^images\//, "");
}

function resetForm() {
  $("formTitle").textContent = "Nieuw product";
  $("productId").value = "";
  $("naam").value = "";
  $("beschrijving").value = "";
  $("prijs").value = "";
  $("kortingsprijs").value = "";
  $("verkoop_type").value = "stuk";
  $("basis_eenheid").value = "stuk";
  $("voorraad").value = "";
  $("voorraad_type").value = "stuk";
  $("foto").value = "";
  $("actief").value = "true";
}

function editProduct(p) {
  $("formTitle").textContent = "Product bewerken";
  $("productId").value = p.id || "";
  $("naam").value = p.naam || p.name || "";
  $("beschrijving").value = p.beschrijving || p.omschrijving || "";
  $("prijs").value = p.basis_prijs ?? p.prijs ?? "";
  $("kortingsprijs").value = p.kortingsprijs ?? "";
  $("verkoop_type").value = p.verkoop_type || "stuk";
  $("basis_eenheid").value = p.basis_eenheid || p.voorraad_eenheid || p.voorraad_type || "stuk";
  $("voorraad").value = p.voorraad_aantal ?? p.voorraad ?? "";
  $("voorraad_type").value = p.voorraad_eenheid || p.voorraad_type || "stuk";
  $("foto").value = p.foto || p.afbeelding || "";
  $("actief").value = String(p.actief !== false);
  window.scrollTo({ top:0, behavior:"smooth" });
}

async function saveProduct() {
  try {
    const id = $("productId").value;

    const payload = {
      naam: $("naam").value.trim(),
      beschrijving: $("beschrijving").value.trim(),
      prijs: numberOrNull($("prijs").value),
      basis_prijs: numberOrNull($("prijs").value),
      kortingsprijs: numberOrNull($("kortingsprijs").value),
      verkoop_type: $("verkoop_type").value,
      basis_eenheid: $("basis_eenheid").value,
      voorraad: numberOrNull($("voorraad").value),
      voorraad_aantal: numberOrNull($("voorraad").value),
      voorraad_type: $("voorraad_type").value,
      voorraad_eenheid: $("voorraad_type").value,
      foto: $("foto").value.trim(),
      actief: $("actief").value === "true"
    };

    if (!payload.naam) throw new Error("Naam is verplicht.");
    if (!payload.prijs || payload.prijs <= 0) throw new Error("Prijs moet hoger zijn dan 0.");

    if (payload.kortingsprijs && payload.kortingsprijs >= payload.prijs) {
      throw new Error("Kortingsprijs moet lager zijn dan de normale prijs.");
    }

    const path = id ? `/admin/products/${id}` : "/admin/products";
    const method = id ? "PUT" : "POST";

    await api(path, {
      method,
      headers: authHeaders(),
      body: JSON.stringify(payload)
    });

    showStatus("adminStatus", "Product opgeslagen.", "ok");
    resetForm();
    loadProducts();

  } catch (err) {
    showStatus("adminStatus", err.message, "err");
  }
}

async function deleteProduct(id) {
  if (!confirm("Weet je zeker dat je dit product wilt verwijderen?")) return;

  try {
    await api(`/admin/products/${id}`, {
      method: "DELETE",
      headers: authHeaders()
    });

    showStatus("adminStatus", "Product verwijderd.", "ok");
    loadProducts();

  } catch (err) {
    showStatus("adminStatus", err.message, "err");
  }
}

function numberOrNull(value) {
  if (value === "" || value === null || value === undefined) return null;
  const n = Number(value);
  return Number.isFinite(n) ? n : null;
}

function escapeHtml(value) {
  return String(value ?? "")
    .replaceAll("&","&amp;")
    .replaceAll("<","&lt;")
    .replaceAll(">","&gt;")
    .replaceAll('"',"&quot;")
    .replaceAll("'","&#039;");
}

if (token) {
  enterAdmin();
}
</script>

</body>
</html>
