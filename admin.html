<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Bless Vegs Admin</title>

<style>
:root{
--green:#14532d;
--green-dark:#0f3f22;
--green-light:#1f7a44;
--bg:#f4f7f4;
--card:#ffffff;
--text:#1b1b1b;
--muted:#666;
--danger:#b91c1c;
--radius:18px;
}
*{box-sizing:border-box;}
body{margin:0;font-family:Arial,Helvetica,sans-serif;background:linear-gradient(180deg,#eef7ef 0%,#f7f7f7 100%);color:var(--text);}
.wrap{max-width:1250px;padding:20px;margin:auto;}
.header{display:flex;align-items:center;justify-content:space-between;gap:20px;margin-bottom:20px;background:linear-gradient(135deg,var(--green),var(--green-dark));padding:20px;border-radius:24px;color:#fff;box-shadow:0 10px 30px rgba(0,0,0,.15);}
.brand{display:flex;align-items:center;gap:16px;}
.logo{width:95px;height:95px;object-fit:contain;background:#fff;padding:8px;border-radius:20px;}
.brand h1{margin:0;font-size:34px;}
.brand p{margin:6px 0 0;opacity:.9;}
.card{background:var(--card);border-radius:var(--radius);padding:20px;margin-bottom:20px;box-shadow:0 10px 30px rgba(0,0,0,.06);}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:14px;}
input,textarea,select{width:100%;padding:14px;border-radius:14px;border:1px solid #dcdcdc;font-size:15px;margin-top:8px;background:#fff;}
textarea{min-height:120px;resize:vertical;}
button{border:none;border-radius:14px;padding:13px 18px;font-size:15px;font-weight:bold;cursor:pointer;transition:.2s;}
.primary{background:var(--green);color:#fff;}
.primary:hover{background:var(--green-dark);}
.secondary{background:#ececec;color:#111;}
.danger{background:var(--danger);color:#fff;}
.actions{display:flex;flex-wrap:wrap;gap:10px;margin-top:10px;}
.hidden{display:none;}
#loginView{max-width:520px;margin:50px auto;}
.login-title{text-align:center;margin-bottom:20px;}
.login-logo{width:120px;display:block;margin:auto;margin-bottom:12px;}
#loginMsg,#formMsg{margin-top:14px;font-weight:bold;}
.products{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:18px;margin-top:20px;}
.product{background:#fff;border-radius:22px;overflow:hidden;box-shadow:0 10px 24px rgba(0,0,0,.08);border:1px solid #ececec;}
.product-image{width:100%;height:220px;object-fit:cover;background:#e7efe8;display:flex;align-items:center;justify-content:center;color:var(--green-dark);font-weight:bold;}
.product-body{padding:16px;}
.badges{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:10px;}
.badge{padding:6px 10px;border-radius:999px;font-size:12px;font-weight:bold;background:#e8f5eb;color:var(--green-dark);}
.price-old{text-decoration:line-through;color:#999;font-size:14px;}
.price-new{font-size:24px;font-weight:bold;color:var(--green-dark);margin-top:4px;}
.topbar{display:flex;flex-wrap:wrap;justify-content:space-between;gap:14px;align-items:center;}
.search{flex:1;min-width:240px;}
@media(max-width:768px){.header{flex-direction:column;align-items:flex-start;}.brand h1{font-size:28px;}.logo{width:75px;height:75px;}}
</style>
</head>
<body>

<div class="wrap">

<div id="loginView">
<div class="card">
<div class="login-title">
<img src="blessvegs-logo.png" class="login-logo" alt="Bless Vegs logo">
<h1>Bless Vegs Admin</h1>
<p>Beveiligde admin toegang met 2FA</p>
</div>
<input id="username" placeholder="Gebruikersnaam">
<input id="password" type="password" placeholder="Wachtwoord">
<input id="twofactor" inputmode="numeric" placeholder="Authenticator 2FA-code">
<button class="primary" id="loginBtn">Inloggen</button>
<div id="loginMsg"></div>
</div>
</div>

<div id="adminView" class="hidden">
<div class="header">
<div class="brand">
<img src="blessvegs-logo.png" class="logo" alt="Bless Vegs logo">
<div>
<h1>Bless Vegs</h1>
<p>Biologisch • Niet bespoten • Met liefde geteeld.</p>
</div>
</div>
<div class="actions">
<a href="https://bvegs.github.io/" target="_blank"><button class="secondary" type="button">Live site bekijken</button></a>
<button class="danger" id="logoutBtn" type="button">Uitloggen</button>
</div>
</div>

<div class="card">
<h2 id="formTitle">Nieuw product</h2>
<div class="grid">
<div><label>Naam</label><input id="name" placeholder="Bijv. Groene Amsoi"></div>
<div><label>Basisprijs (€)</label><input id="price" type="number" step="0.01"></div>
<div><label>Kortingsprijs (€)</label><input id="discount" type="number" step="0.01"></div>
<div><label>Voorraad</label><input id="stock" type="number"></div>
<div><label>Verkoop type</label><select id="sellType"><option value="stuk">stuk</option><option value="bos">bos</option><option value="bakje">bakje</option><option value="gewicht">gewicht</option></select></div>
<div><label>Eenheid</label><select id="stockType"><option value="stuk">stuk</option><option value="bos">bos</option><option value="bakje">bakje</option><option value="kg">kg</option><option value="g">g</option></select></div>
<div><label>Minimum hoeveelheid</label><input id="minQty" type="number" value="1"></div>
<div><label>Stapgrootte</label><input id="stepQty" type="number" value="1"></div>
</div>
<label>Beschrijving</label><textarea id="desc"></textarea>
<label>Foto URL of bestandsnaam</label><input id="photo" placeholder="Bijv. Groene-Amsoi.jpg">
<div class="actions">
<button class="primary" id="saveBtn" type="button">Opslaan</button>
<button class="secondary" id="resetBtn" type="button">Formulier leegmaken</button>
</div>
<div id="formMsg"></div>
</div>

<div class="card">
<div class="topbar">
<h2>Producten</h2>
<input id="search" class="search" placeholder="Zoek product...">
</div>
<div class="actions">
<button class="secondary" id="refreshBtn" type="button">Producten verversen</button>
</div>
<div id="list" class="products"></div>
</div>
</div>
</div>

<script>
const API = "https://blessvegs-backend.onrender.com";
let token = localStorage.getItem("token") || "";
let products = [];
let editing = null;

const el = (id) => document.getElementById(id);

function showAdmin(){el("loginView").classList.add("hidden");el("adminView").classList.remove("hidden");}
function showLogin(){el("loginView").classList.remove("hidden");el("adminView").classList.add("hidden");}
function money(value){return new Intl.NumberFormat("nl-NL",{style:"currency",currency:"EUR"}).format(Number(value || 0));}

function imageSrc(value){
const foto = String(value || "").trim();
if(!foto) return "";
if(foto.startsWith("http://") || foto.startsWith("https://")) return foto;
if(foto.startsWith("images/")) return foto;
return "images/" + foto;
}

async function login(){
el("loginMsg").innerText = "";
try{
const res = await fetch(API+"/admin/login",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({
username:el("username").value,
password:el("password").value,
token:el("twofactor").value
})
});
const data = await res.json();
if(data.ok){
token = data.data.token;
localStorage.setItem("token", token);
showAdmin();
loadProducts();
}else{
el("loginMsg").innerText = data.error || "Inloggen mislukt";
}
}catch(e){el("loginMsg").innerText = "Login error";}
}

function logout(){localStorage.removeItem("token");token="";showLogin();}

async function loadProducts(){
try{
const res = await fetch(API+"/admin/products",{headers:{Authorization:"Bearer "+token}});
const data = await res.json();
if(!data.ok){
products = [];
el("list").innerHTML = "<p>Producten laden mislukt. Log opnieuw in.</p>";
return;
}
products = data.data || [];
renderProducts();
}catch(e){el("list").innerHTML = "<p>Producten laden mislukt.</p>";}
}

function renderProducts(){
const q = el("search").value.toLowerCase();
el("list").innerHTML = "";
const filtered = products.filter(p => String(p.name || "").toLowerCase().includes(q));
if(!filtered.length){el("list").innerHTML = "<p>Geen producten gevonden.</p>";return;}
filtered.forEach(p=>{
const normalPrice = Number(p.prijs || p.basis_prijs || 0);
const discountPrice = Number(p.kortingsprijs || 0);
const finalPrice = discountPrice > 0 && discountPrice < normalPrice ? discountPrice : normalPrice;
const img = imageSrc(p.foto || p.afbeelding);
const card = document.createElement("div");
card.className = "product";
card.innerHTML = `
${img ? `<img src="${img}" class="product-image" alt="${p.name || 'Product'}" onerror="this.outerHTML='<div class=&quot;product-image&quot;>Bless Vegs</div>'">` : `<div class="product-image">Bless Vegs</div>`}
<div class="product-body">
<div class="badges"><div class="badge">${p.verkoop_type || "stuk"}</div><div class="badge">${p.voorraad || p.voorraad_aantal || 0} ${p.voorraad_type || p.voorraad_eenheid || ""}</div></div>
<h3>${p.name || "Naamloos product"}</h3>
${discountPrice > 0 && discountPrice < normalPrice ? `<div class="price-old">${money(normalPrice)}</div>` : ``}
<div class="price-new">${money(finalPrice)}</div>
<p>${p.beschrijving || p.omschrijving || ""}</p>
<div class="actions"><button class="secondary" type="button" data-action="edit" data-id="${p.id}">Bewerken</button><button class="danger" type="button" data-action="delete" data-id="${p.id}">Verwijderen</button></div>
</div>`;
el("list").appendChild(card);
});
}

function startEdit(id){
const p = products.find(x => String(x.id) === String(id));
if(!p) return;
editing = p.id;
el("formTitle").innerText = "Product bewerken";
el("name").value = p.name || "";
el("price").value = p.prijs || p.basis_prijs || 0;
el("discount").value = p.kortingsprijs || 0;
el("stock").value = p.voorraad || p.voorraad_aantal || 0;
el("stockType").value = p.voorraad_type || p.voorraad_eenheid || "stuk";
el("sellType").value = p.verkoop_type || "stuk";
el("desc").value = p.beschrijving || p.omschrijving || "";
el("photo").value = p.foto || p.afbeelding || "";
el("minQty").value = p.minimum_bestelhoeveelheid || (p.verkoop_type === "gewicht" ? 250 : 1);
el("stepQty").value = p.stapgrootte || (p.verkoop_type === "gewicht" ? 250 : 1);
window.scrollTo({top:0,behavior:"smooth"});
}

function resetForm(){
editing = null;
el("formTitle").innerText = "Nieuw product";
el("name").value="";el("price").value="";el("discount").value="";el("stock").value="";el("desc").value="";el("photo").value="";
el("sellType").value="stuk";el("stockType").value="stuk";el("minQty").value=1;el("stepQty").value=1;el("formMsg").innerText="";
}

async function saveProduct(){
el("formMsg").innerText="";
const verkoopType = el("sellType").value;
const eenheid = el("stockType").value;
const body = {
name:el("name").value,
prijs:+el("price").value,
basis_prijs:+el("price").value,
kortingsprijs:+el("discount").value || 0,
voorraad:+el("stock").value,
voorraad_aantal:+el("stock").value,
voorraad_type:eenheid,
voorraad_eenheid:eenheid,
verkoop_type:verkoopType,
basis_eenheid:eenheid,
minimum_bestelhoeveelheid:+el("minQty").value,
stapgrootte:+el("stepQty").value,
beschrijving:el("desc").value,
foto:el("photo").value
};
const url = editing ? "/admin/products/"+editing : "/admin/products";
const method = editing ? "PUT" : "POST";
try{
const res = await fetch(API+url,{method,headers:{"Content-Type":"application/json",Authorization:"Bearer "+token},body:JSON.stringify(body)});
const data = await res.json();
if(data.ok){el("formMsg").innerText="Product opgeslagen.";resetForm();loadProducts();}else{el("formMsg").innerText=data.error || "Opslaan mislukt.";}
}catch(e){el("formMsg").innerText="Opslaan mislukt.";}
}

async function deleteProduct(id){
if(!confirm("Product verwijderen?")) return;
try{
await fetch(API+"/admin/products/"+id,{method:"DELETE",headers:{Authorization:"Bearer "+token}});
loadProducts();
}catch(e){alert("Verwijderen mislukt.");}
}

el("loginBtn").addEventListener("click", login);
el("logoutBtn").addEventListener("click", logout);
el("saveBtn").addEventListener("click", saveProduct);
el("resetBtn").addEventListener("click", resetForm);
el("refreshBtn").addEventListener("click", loadProducts);
el("search").addEventListener("input", renderProducts);
el("list").addEventListener("click", function(e){
const btn = e.target.closest("button[data-action]");
if(!btn) return;
const id = btn.getAttribute("data-id");
if(btn.getAttribute("data-action") === "edit") startEdit(id);
if(btn.getAttribute("data-action") === "delete") deleteProduct(id);
});

if(token){showAdmin();loadProducts();}
</script>
</body>
</html>
