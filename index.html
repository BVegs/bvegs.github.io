<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BlessVegs</title>

  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#14532d">

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    body { font-family: Arial; margin: 0; background: #f6f8f4; text-align: center; }
    header { background: #14532d; color: white; padding: 20px; }
    .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; padding: 10px; }
    .card { background: white; padding: 15px; border-radius: 10px; }
    button { background: green; color: white; padding: 10px; border: none; border-radius: 6px; }
  </style>
</head>

<body>

<header>
  <h1>🌿 BlessVegs</h1>
</header>

<div id="products" class="grid"></div>

<script>
const supabase = window.supabase.createClient(
  'https://fzwvqptjhjlfrriyuqcp.supabase.co',
  'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZ6d3ZxcHRqaGpsZnJyaXl1cWNwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQwNzQ5NjYsImV4cCI6MjA4OTY1MDk2Nn0.pxU7DNVn_WjyXjBg3KDq8A2oeVqir3_tKGtEQ61kJ4Q'
);

async function loadProducts() {
  const { data, error } = await supabase.from('producten').select('*');
  const container = document.getElementById('products');

  if (error) {
    container.innerHTML = "❌ Fout";
    return;
  }

  if (!data || data.length === 0) {
    container.innerHTML = "⚠️ Geen producten";
    return;
  }

  container.innerHTML = "";

  data.forEach(p => {
    const div = document.createElement("div");
    div.className = "card";
    div.innerHTML = `
      <h3>${p.name}</h3>
      <p>€${p.prijs}</p>
      <button onclick="order('${p.name}')">Bestel</button>
    `;
    container.appendChild(div);
  });
}

function order(product) {
  window.open(`https://wa.me/31685122481?text=Ik wil ${product}`);
}

loadProducts();

// ✅ Service Worker registratie
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('/sw.js');
}
</script>

</body>
</html>
