
<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bless Vegs</title>
<style>
body{font-family:Arial;margin:0;background:#eef5ee}
header{background:#2f7d32;color:white;text-align:center;padding:18px;font-size:24px}
.container{max-width:900px;margin:auto;padding:20px}
.card{background:white;border-radius:14px;padding:16px;margin-bottom:18px;box-shadow:0 6px 14px rgba(0,0,0,0.08)}
.product{display:flex;align-items:center;gap:12px;margin:10px 0}
.product img{width:70px;height:70px;object-fit:cover;border-radius:10px}
.info{flex:1}
.qty{width:70px;padding:6px}
input,textarea{width:100%;padding:8px;margin-top:5px;margin-bottom:10px}
button{width:100%;padding:14px;border:none;border-radius:10px;font-size:16px;cursor:pointer;margin-top:10px}
.whatsapp{background:#25D366;color:white}
.tikkie{background:#ff9800;color:white}
.total{font-size:20px;text-align:right;margin-top:10px}
.stock{font-size:12px;color:#666}
.adminbtn{background:#333;color:white}
.hidden{display:none}
</style>
</head>
<body>

<header>🌱 Bless Vegs – Verse Biologische Groenten</header>

<div class="container">

<div class="card">
<h3>🧑‍🌾 Klantgegevens</h3>
<input id="naam" placeholder="Naam">
<textarea id="adres" placeholder="Adres"></textarea>
</div>

<div class="card">
<h3>🥦 Groenten</h3>
<div id="productlijst"></div>
<div class="total">€ <span id="totaal">0.00</span></div>
<button class="whatsapp" onclick="bestel()">Bestellen via WhatsApp</button>
</div>

<div class="card">
<h3>📦 Groentepakket (1 klik)</h3>
<button onclick="pakket('klein')">Klein pakket €10</button>
<button onclick="pakket('groot')">Groot pakket €15</button>
</div>

<div class="card">
<h3>⚙️ Admin</h3>
<button class="adminbtn" onclick="loginAdmin()">Login</button>
<div id="admin" class="hidden">
<h4>📊 Dashboard</h4>
<div id="dashboard"></div>

<h4>➕ Product</h4>
<input id="nieuwNaam" placeholder="Naam">
<input id="nieuwPrijs" placeholder="Prijs">
<input id="nieuwVoorraad" placeholder="Voorraad">
<input id="nieuwFoto" placeholder="Foto link">
<button onclick="toevoegen()">Toevoegen</button>

<div id="adminlijst"></div>
</div>
</div>

</div>

<script>

const nummer="31685122481"
let omzet=0
let bestellingen=0

let producten=[
{name:"Antroewa",prijs:4,voorraad:20,id:"a"},
{name:"Amsoi",prijs:3,voorraad:15,id:"b"},
{name:"Bitawieri",prijs:3.5,voorraad:15,id:"c"}
]

function render(){
let html=""
producten.forEach(p=>{
html+=`<div class='product'>
<div class='info'>${p.name} €${p.prijs} (${p.voorraad})</div>
<input id='${p.id}' class='qty' type='number' value='0'>
</div>`
})
document.getElementById("productlijst").innerHTML=html

let admin=""
producten.forEach((p,i)=>{
admin+=`${p.name} €${p.prijs} (${p.voorraad}) <button onclick='del(${i})'>x</button><br>`
})
document.getElementById("adminlijst").innerHTML=admin

updateDashboard()
}

function updateDashboard(){
document.getElementById("dashboard").innerHTML=
`Omzet: €${omzet.toFixed(2)}<br>Bestellingen: ${bestellingen}`
}

setInterval(()=>{
let t=0
producten.forEach(p=>{
let v=document.getElementById(p.id)
if(v) t+=v.value*p.prijs
})
document.getElementById("totaal").innerText=t.toFixed(2)
},500)

function bestel(){
let totaal=0
let msg="Bestelling:%0A"
producten.forEach(p=>{
let v=document.getElementById(p.id).value
if(v>0){
totaal+=v*p.prijs
p.voorraad-=v
msg+=`${p.name} ${v}kg%0A`
}
})

if(totaal<10){alert("Minimum bestelling €10");return}

omzet+=totaal
bestellingen++

msg+=`Totaal €${totaal}`
window.open(`https://wa.me/${nummer}?text=${msg}`)
render()
}

function pakket(type){
let totaal= type=="klein"?10:15
omzet+=totaal
bestellingen++
window.open(`https://wa.me/${nummer}?text=Groentepakket ${type} €${totaal}`)
updateDashboard()
}

function loginAdmin(){
let p=prompt("wachtwoord")
if(p=="bless123"){
document.getElementById("admin").classList.remove("hidden")
}else alert("fout")
}

function toevoegen(){
let n=document.getElementById("nieuwNaam").value
let p=parseFloat(document.getElementById("nieuwPrijs").value)
let v=parseInt(document.getElementById("nieuwVoorraad").value)
producten.push({name:n,prijs:p,voorraad:v,id:n})
render()
}

function del(i){producten.splice(i,1);render()}

render()

</script>

</body>
</html>
