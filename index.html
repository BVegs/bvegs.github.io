<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Bless Vegs</title>
<link rel="manifest" href="manifest.json" />
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
body{font-family:Arial;margin:0;background:#f0fdf4}
header{background:#14532d;color:#fff;padding:20px;text-align:center}
.container{padding:16px}
.card{background:#fff;padding:16px;border-radius:12px;margin-bottom:12px}
button{padding:10px;border:none;border-radius:8px;background:#16a34a;color:#fff}
</style>
</head>
<body>

<div id="splash" style="position:fixed;inset:0;background:#14532d;color:white;display:flex;align-items:center;justify-content:center;font-size:24px;">
🌱 Bless Vegs
</div>

<header>
<h1>🌱 Bless Vegs</h1>
<p>Biologisch • Niet bespoten • Met liefde geteeld</p>
</header>

<div class="container">
<div class="card">
<h2>Wie en wat we zijn</h2>
<p>Wij zijn een klein lokaal initiatief dat met liefde en zorg groenten verbouwt in onze eigen tuin.</p>
</div>

<div class="card">
<h2>Producten</h2>
<div id="products">Laden...</div>
</div>
</div>

<script>
const supabase = window.supabase.createClient(
'https://fzwvqptjhjlfrriyuqcp.supabase.co',
'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...'
);

async function loadProducts(){
  const { data } = await supabase.from('producten').select('*');
  const el = document.getElementById('products');
  if(!data){ el.innerHTML="Geen data"; return; }

  el.innerHTML = data.map(p=>`
    <div>
      <b>${p.name}</b><br>
      <span style="text-decoration:line-through;">€${(p.prijs*1.2).toFixed(2)}</span>
      <b> €${p.prijs}</b>
    </div>
  `).join('');
}

async function start(){
  try{
    await loadProducts();
  }catch(e){
    console.log(e);
  }finally{
    document.getElementById('splash').style.display='none';
  }
}

start();
</script>

</body>
</html>
