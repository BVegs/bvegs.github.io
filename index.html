<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bless Vegs</title>

  <style>
    body {
      font-family: Arial;
      margin: 0;
      background: #f5f5f5;
    }

    header {
      background: green;
      color: white;
      text-align: center;
      padding: 20px;
    }

    .logo {
      width: 100px;
    }

    .products {
      padding: 20px;
    }

    .product {
      background: white;
      padding: 15px;
      margin-bottom: 10px;
      border-radius: 10px;
    }

    button {
      background: green;
      color: white;
      border: none;
      padding: 10px;
      border-radius: 5px;
      cursor: pointer;
    }

    .info {
      padding: 20px;
      font-size: 14px;
    }
  </style>
</head>

<body>

<header>
  <!-- Zet jouw logo in dezelfde map en noem hem logo.png -->
  <img src="logo.png" class="logo">
  <h1>Bless Vegs</h1>
</header>

<section class="products">
  <h2>Groenten</h2>

  <div class="product">
    <p>Tomaten (€2/kg)</p>
    <button onclick="order('Tomaten')">Bestel</button>
  </div>

  <div class="product">
    <p>Komkommer (€1/stuk)</p>
    <button onclick="order('Komkommer')">Bestel</button>
  </div>

</section>

<section class="info">
  <p>📦 Minimum bestelling: €10</p>
  <p>🚚 Bezorgen mogelijk (tegen vergoeding)</p>
</section>

<script>
function order(product) {
  let message = "Ik wil bestellen: " + product;
  let phone = "31600000000"; // <-- vervang met jouw nummer

  let url = "https://wa.me/" + phone + "?text=" + encodeURIComponent(message);

  window.open(url, "_blank");
}
</script>

</body>
</html>
