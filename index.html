<!DOCTYPE html><html lang="nl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Bless Vegs</title>
<meta name="theme-color" content="#14532d" />
<link rel="icon" type="image/png" href="blessvegs-logo.png" />
<meta property="og:title" content="Bless Vegs" />
<meta property="og:description" content="Biologisch, niet bespoten en met liefde geteeld." />
<meta property="og:image" content="blessvegs-logo.png" />
<link rel="manifest" href="manifest.json" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="Bless Vegs" />
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
html{scroll-behavior:smooth}
:root{--green:#14532d;--green2:#22c55e;--bg:#f0fdf4;--card:rgba(255,255,255,0.92);--text:#0f172a;--muted:#64748b;--line:#e2e8f0;--orange:#f97316;--shadow:0 20px 40px rgba(0,0,0,.12);--red:#dc2626;--blue:#2563eb;--glass:blur(12px);--gold:#f59e0b}
*{box-sizing:border-box}
body{margin:0;font-family:'Poppins',Arial,Helvetica,sans-serif;background:linear-gradient(135deg,#ecfdf5,#f0fdf4);color:var(--text)}
header{background:linear-gradient(135deg,var(--green),var(--green2));color:#fff;padding:30px 16px;text-align:center;box-shadow:var(--shadow)}
.header-logo{width:min(100%,620px);max-height:260px;object-fit:cover;border-radius:24px;display:block;margin:0 auto 16px;background:#fff;box-shadow:var(--shadow)}
header h1{margin:0;font-size:30px}
header p{margin:8px 0 0;opacity:.96}
.container{max-width:1200px;margin:0 auto;padding:18px}
.grid{display:grid;grid-template-columns:1.2fr .8fr;gap:18px}
.card{background:var(--card);backdrop-filter:var(--glass);border-radius:22px;padding:20px;box-shadow:var(--shadow);margin-bottom:18px;border:1px solid rgba(255,255,255,0.4)}
.card h2,.card h3{margin-top:0}.small{font-size:13px;color:var(--muted)}.hidden{display:none}
.badges{display:flex;flex-wrap:wrap;gap:10px}.badge{background:linear-gradient(135deg,#dcfce7,#bbf7d0);color:var(--green);padding:8px 14px;border-radius:999px;font-size:14px;font-weight:bold;box-shadow:0 4px 10px rgba(0,0,0,.05)}
.steps{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-top:16px}.step{background:#f8fafc;border:1px solid var(--line);border-radius:16px;padding:12px;text-align:center}.step b{display:block;margin-bottom:4px}
label{display:block;font-weight:bold;margin:10px 0 6px}.split{display:grid;grid-template-columns:1fr 1fr;gap:10px}
input,textarea,select{width:100%;padding:12px;border:1px solid #d1d5db;border-radius:12px;background:#fff;font-size:15px} textarea{min-height:92px;resize:vertical}
button{border:none;border-radius:16px;padding:14px 16px;font-size:15px;font-weight:bold;cursor:pointer;transition:all .2s ease} button:hover{transform:translateY(-2px);box-shadow:0 8px 20px rgba(0,0,0,.15)}
.btn-row{display:grid;grid-template-columns:1fr 1fr;gap:10px}.btn-green{background:linear-gradient(135deg,#25D366,#16a34a);color:#fff}.btn-orange{background:linear-gradient(135deg,#fb923c,#f97316);color:#fff}.btn-dark{background:linear-gradient(135deg,#111827,#1f2937);color:#fff}.btn-soft{background:#e5e7eb;color:#111827}.btn-blue{background:linear-gradient(135deg,#3b82f6,#2563eb);color:#fff}.btn-red{background:var(--red);color:#fff}
.product{display:grid;grid-template-columns:76px 1fr 90px 120px;gap:12px;align-items:center;padding:14px 0;border-bottom:1px solid var(--line)}.product:last-child{border-bottom:none}
.product img{width:76px;height:76px;object-fit:cover;border-radius:16px;background:#f3f4f6;box-shadow:0 6px 14px rgba(0,0,0,.1)}
.product-name{font-weight:bold;font-size:17px}.product-price{color:var(--green);font-weight:bold}.product-meta{font-size:13px;color:var(--muted);margin-top:4px}.product-tags{display:flex;gap:6px;flex-wrap:wrap;margin-top:6px}.tag{font-size:11px;padding:4px 8px;border-radius:999px;background:#f1f5f9}.tag.stock-low{background:#fff7ed;color:#9a3412}.tag.stock-ok{background:#ecfdf5;color:#166534}
.to
